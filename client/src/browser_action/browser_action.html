<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 360px; font-family: sans-serif; padding: 12px; background: #f9f9f9; }
    h2 { color: #4285F4; margin: 0 0 12px; }
    button {
      width: 100%; padding: 8px; margin: 4px 0;
      border: none; border-radius: 6px;
      background: #4285F4; color: white;
      cursor: pointer; font-size: 14px;
    }
    button:disabled { opacity: 0.6; }
    .output {
      background: white; border: 1px solid #ddd;
      border-radius: 6px; padding: 8px;
      margin: 6px 0; font-size: 12px;
      max-height: 120px; overflow-y: auto;
      min-height: 32px;
    }
    input {
      width: 94%; padding: 8px; margin: 4px 0;
      border: 1px solid #ddd; border-radius: 6px;
    }
    .section { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
    .label { font-size: 11px; color: #666; margin-bottom: 2px; }
  </style>
</head>
<body>
  <h2>NotesNexus</h2>

  <button id="toggleBtn">Start NotesNexus</button>

  <div class="section">
    <div class="label">Live OCR</div>
    <div class="output" id="ocrOutput">Waiting for capture...</div>
    <div class="label">Lecture key terms</div>
    <div class="output" id="entities"></div>
  </div>

  <div class="section">
    <button id="summarizeBtn">Summarize Notes</button>
    <div class="output" id="summaryOutput"></div>
  </div>

  <div class="section">
    <input type="text" id="questionInput" placeholder="Ask a question about the lecture...">
    <button id="askBtn">Ask</button>
    <div class="output" id="answerOutput"></div>
  </div>

  <div class="section">
    <button id="timelineBtn">Show Slide Timeline</button>
    <div class="output" id="timelineOutput"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
